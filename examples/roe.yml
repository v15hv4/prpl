# Rules of Engagement - PLACEHOLDER
# ⚠️  UPDATE ALL PLACEHOLDER VALUES BEFORE RUNNING ASSESSMENT

assessment_name: "PLACEHOLDER - Update Before Use"

targets:
  domains:
    - "example.com"                     # UPDATE: your target domain
    # - "*.example.com"                 # Subdomains only (not apex)

exclusions:
  domains: []
    # - "payments.example.com"          # Explicitly excluded subdomains
  paths: []
    # - "/admin/delete"                 # Global path exclusions

allowed_actions:
  - passive_recon
  - active_recon
  - authenticated_testing
  - vulnerability_scanning
  - injection_testing
  - cloud_testing
  - third_party_testing
  - rate_limit_testing

rate_limits:
  requests_per_second: 10
  concurrent_hosts: 2

accounts: {}
  # test_user:
  #   username: "testuser@example.com"
  #   secret_ref: "env:TEST_USER_PASSWORD"  # Must be env:VAR_NAME format
  #   role: "standard"                       # standard | admin | free | paid
